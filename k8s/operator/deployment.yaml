apiVersion: v1
kind: Namespace
metadata:
  name: minikv-system
  labels:
    app.kubernetes.io/name: minikv
    app.kubernetes.io/component: operator

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minikv-operator
  namespace: minikv-system
  labels:
    app.kubernetes.io/name: minikv-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/version: "0.9.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minikv-operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minikv-operator
        app.kubernetes.io/component: operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: minikv-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: operator
          image: ghcr.io/whispem/minikv-operator:0.9.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: WATCH_NAMESPACE
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "minikv-operator"
            - name: RUST_LOG
              value: "info,minikv_operator=debug"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: minikv-operator
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: minikv-operator-metrics
  namespace: minikv-system
  labels:
    app.kubernetes.io/name: minikv-operator
    app.kubernetes.io/component: operator
spec:
  selector:
    app.kubernetes.io/name: minikv-operator
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minikv-operator
  namespace: minikv-system
  labels:
    app.kubernetes.io/name: minikv-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: minikv-operator
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minikv-operator
  namespace: minikv-system
  labels:
    app.kubernetes.io/name: minikv-operator
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: minikv-operator
