# Basic MiniKV cluster
apiVersion: minikv.io/v1alpha1
kind: MiniKVCluster
metadata:
  name: my-minikv
  namespace: default
spec:
  coordinators:
    replicas: 3
    image: ghcr.io/whispem/minikv-coord:0.9.0
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "5Gi"
      storageClassName: "standard"

  volumes:
    replicas: 3
    image: ghcr.io/whispem/minikv-volume:0.9.0
    replicationFactor: 3
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "50Gi"
      storageClassName: "standard"

  security:
    tls:
      enabled: true
      secretName: minikv-tls
    authentication:
      enabled: true
      adminSecretName: minikv-admin-key
    encryption:
      atRest: true
      keySecretName: minikv-encryption-key

  observability:
    metrics:
      enabled: true
      port: 9090

---
apiVersion: v1
kind: Secret
metadata:
  name: minikv-tls
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: |
    LS0tLS1CRUdJTi...
  tls.key: |
    LS0tLS1CRUdJTi...

---
apiVersion: v1
kind: Secret
metadata:
  name: minikv-admin-key
  namespace: default
type: Opaque
stringData:
  api-key: "your-secure-admin-api-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: minikv-encryption-key
  namespace: default
type: Opaque
stringData:
  encryption-key: "your-32-byte-encryption-key-here!"
