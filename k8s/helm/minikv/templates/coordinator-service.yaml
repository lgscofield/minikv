{{- if .Values.coordinator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minikv.fullname" . }}-coord
  labels:
    app.kubernetes.io/name: {{ include "minikv.name" . }}
    app.kubernetes.io/component: coordinator
spec:
  type: {{ .Values.coordinator.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "minikv.name" . }}
    app.kubernetes.io/component: coordinator
  ports:
    - name: http
      port: {{ .Values.coordinator.service.port }}
      targetPort: http
{{- end }}
