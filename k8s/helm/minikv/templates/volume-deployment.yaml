{{- if .Values.volume.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minikv.fullname" . }}-volume
  labels:
    app.kubernetes.io/name: {{ include "minikv.name" . }}
    app.kubernetes.io/component: volume
spec:
  replicas: {{ .Values.volume.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "minikv.name" . }}
      app.kubernetes.io/component: volume
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "minikv.name" . }}
        app.kubernetes.io/component: volume
    spec:
      containers:
        - name: volume
          image: "{{ .Values.volume.image.repository }}:{{ .Values.volume.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.volume.service.port }}
          resources:
{{ toYaml .Values.volume.resources | indent 12 }}
{{- end }}
