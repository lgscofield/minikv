global:
  imagePullPolicy: IfNotPresent

coordinator:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/whispem/minikv-coordinator
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

volume:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/whispem/minikv-volume
    tag: latest
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

probes:
  readinessPath: /health/ready
  livenessPath: /health/live
  initialDelaySeconds: 10
  periodSeconds: 10
